services:
  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://writebot:writebot@postgres:5432/writebot
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: change-me-in-production
      DEFAULT_PROVIDER: openai-compatible-local
      OPENAI_BASE_URL: http://host.docker.internal:11434/v1
      ANTHROPIC_API_KEY: ""
      GEMINI_API_KEY: ""
    ports:
      - "3000:3000"

  worker:
    build: .
    command: ["pnpm", "selfhost:worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://writebot:writebot@postgres:5432/writebot
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: change-me-in-production
      DEFAULT_PROVIDER: openai-compatible-local
      OPENAI_BASE_URL: http://host.docker.internal:11434/v1
      ANTHROPIC_API_KEY: ""
      GEMINI_API_KEY: ""

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: writebot
      POSTGRES_USER: writebot
      POSTGRES_PASSWORD: writebot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U writebot -d writebot"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
